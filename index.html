<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Builder v4 — AI Prompt Consultant</title>
<style>
/* Persis sama kayak v3.1, cuma ada tambahan styling buat chat */
/* ... taruh semua CSS dari v3.1 di sini ... */
/* Tambahan ini: */
.api-key-area { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.api-key-input { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 8px; color: var(--text); width: 180px; font-size: 11px; font-family: var(--mono); }
.deep-btn { padding: 9px 16px; background: #8b5cf6; color: #fff; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; margin-left: 6px; }
.deep-btn:hover { opacity: .88; }
.deep-btn:disabled { opacity: .4; cursor: not-allowed; }
.chat-panel { display: none; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 10px 18px; max-height: 300px; overflow-y: auto; flex-direction: column; gap: 8px; }
.chat-panel.show { display: flex; }
.chat-bubble { max-width: 85%; padding: 8px 12px; border-radius: 12px; font-size: 12px; line-height: 1.5; word-break: break-word; }
.chat-bubble.ai { align-self: flex-start; background: var(--bg3); border: 0.5px solid var(--border); }
.chat-bubble.user { align-self: flex-end; background: var(--accent); color: #0f0f0f; }
.chat-input-row { display: flex; gap: 6px; margin-top: 8px; }
.chat-input-row input { flex: 1; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 20px; padding: 7px 12px; color: var(--text); font-size: 12px; }
.chat-input-row button { background: var(--accent); border: none; border-radius: 20px; padding: 7px 14px; color: #0f0f0f; font-weight: 600; cursor: pointer; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="toast"></div>
<div id="overlay" onclick="closeSidebar()"></div>

<header>
  <button class="icon-btn hamburger" onclick="openSidebar()" data-tip="Menu">☰</button>
  <div class="logo">P</div>
  <div>
    <div class="header-title">Prompt Builder</div>
    <div class="header-sub">Ketik singkat → dapat prompt tajam</div>
  </div>
  <div class="header-right">
    <div class="api-key-area">
      <input type="password" id="apiKeyInput" class="api-key-input" placeholder="Gemini API Key" onchange="saveApiKey()">
      <button class="icon-btn" data-tip="Simpan API Key">🔑</button>
    </div>
    <span class="autosave" id="autosaveIndicator" data-tip="Auto-save aktif"><span class="dot2"></span>Tersimpan</span>
    <div class="header-badge">v4.0</div>
    <button class="icon-btn" onclick="toggleTheme()" data-tip="Toggle dark/light mode" id="themeBtn">🌙</button>
  </div>
</header>

<div class="app">
  <!-- ── SIDEBAR ── -->
  <div class="sidebar" id="sidebar"> ... </div>

  <!-- ── MAIN ── -->
  <div class="main">
    <div class="intent-bar">
      <div class="intent-wrap">
        <textarea class="intent-input" id="intentInput" rows="2"
          placeholder="Ketik apa yang mau dibuat... contoh: bikin aplikasi manajemen tugas, lagu pop tentang hujan, artikel tentang AI"
          oninput="onIntentInput(this.value)"></textarea>
        <button class="detect-btn" id="detectBtn" onclick="detectAndShow()">Generate →</button>
        <button class="deep-btn" id="deepAskBtn" onclick="startDeepAsk()">🧠 Deep Ask</button>
      </div>
      <!-- ... -->
    </div>

    <!-- CHAT PANEL DEEP ASK -->
    <div id="chatPanel" class="chat-panel">
      <div id="chatMessages"></div>
      <div class="chat-input-row">
        <input type="text" id="chatUserInput" placeholder="Balas..." onkeypress="if(event.key==='Enter')sendChatMessage()">
        <button onclick="sendChatMessage()">Kirim</button>
      </div>
    </div>

    <!-- QUESTIONS & EDITOR (sama persis) -->
    <!-- ... -->
  </div>
</div>

<script>
// ── GLOBAL STATE TAMBAHAN ──
let chatHistory = []; // untuk Deep Ask
let deepAskActive = false;

// ── FUNGSI API KEY ──
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  localStorage.setItem('gemini_api_key', key);
  toast('API Key disimpan ✅');
}
function getApiKey() {
  return localStorage.getItem('gemini_api_key') || '';
}

// ── DEEP ASK ──
async function startDeepAsk() {
  const apiKey = getApiKey();
  if (!apiKey) {
    toast('Masukkan Gemini API Key dulu di pojok kanan atas!');
    return;
  }
  const intent = document.getElementById('intentInput').value.trim();
  if (!intent) {
    toast('Tulis dulu ide awalnya di kolom!');
    return;
  }
  
  document.getElementById('chatPanel').classList.add('show');
  document.getElementById('chatMessages').innerHTML = '';
  chatHistory = [];
  deepAskActive = true;
  
  // System prompt untuk AI Consultant
  const systemPrompt = `Kamu adalah Prompt Engineer Expert. Tugasmu mengobrol dengan user untuk memahami kebutuhannya, lalu merancang prompt terbaik.
Lakukan:
1. Sapa singkat.
2. Analisis intent user: "${intent}".
3. Ajukan pertanyaan penting (maks 5) untuk klarifikasi: tujuan, audiens, tone, format, constraints, referensi.
4. Setelah diskusi cukup, buatkan konfigurasi prompt. Akhiri dengan "PROMPT_READY" diikuti spesifikasi:
SYSTEM: ...
USER: ...
TONE: ... (pilih dari Professional, Santai, Teknikal, Ringkas, Detail)
FORMAT: ... (Plain text, Markdown, JSON, Kode saja, Step-by-step, Tabel)
REASONING: ... (Standard, Think step by step, Chain of thought, Pros & cons)
CONSTRAINTS: ...
Pastikan kamu hanya menulis format itu setelah PROMPT_READY.`;
  
  // Tambahkan system prompt ke history (tidak ditampilkan)
  chatHistory.push({ role: 'user', parts: [{ text: `[SYSTEM]: ${systemPrompt}` }] });
  chatHistory.push({ role: 'model', parts: [{ text: 'Halo! Gue siap bantu bikin prompt yang pas. Boleh ceritakan lebih detail tentang kebutuhan lo?' }] });
  
  addChatBubble('ai', 'Halo! Gue siap bantu bikin prompt yang pas. Boleh ceritakan lebih detail tentang kebutuhan lo?');
}

function addChatBubble(sender, text) {
  const div = document.createElement('div');
  div.className = `chat-bubble ${sender}`;
  div.textContent = text;
  document.getElementById('chatMessages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

async function sendChatMessage() {
  const input = document.getElementById('chatUserInput');
  const msg = input.value.trim();
  if (!msg || !deepAskActive) return;
  
  addChatBubble('user', msg);
  chatHistory.push({ role: 'user', parts: [{ text: msg }] });
  input.value = '';
  
  const apiKey = getApiKey();
  if (!apiKey) { toast('API key missing'); return; }
  
  // Panggil Gemini API
  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: chatHistory,
          generationConfig: { temperature: 0.7, maxOutputTokens: 1000 }
        })
      }
    );
    const data = await response.json();
    const reply = data.candidates[0].content.parts[0].text;
    
    chatHistory.push({ role: 'model', parts: [{ text: reply }] });
    addChatBubble('ai', reply);
    
    // Cek apakah AI sudah selesai (ada PROMPT_READY)
    if (reply.includes('PROMPT_READY')) {
      deepAskActive = false;
      // Parse konfigurasi
      parseAndApplyConfig(reply);
    }
  } catch (err) {
    addChatBubble('ai', 'Maaf, terjadi error. Cek API key atau koneksi.');
  }
}

function parseAndApplyConfig(text) {
  // Ekstrak bagian setelah PROMPT_READY
  const parts = text.split('PROMPT_READY');
  if (parts.length < 2) return;
  const configBlock = parts[1];
  
  // Parsing sederhana (asumsi tiap baris KEY: VALUE)
  const config = {};
  const lines = configBlock.split('\n');
  for (const line of lines) {
    const match = line.match(/^(SYSTEM|USER|TONE|FORMAT|REASONING|CONSTRAINTS)\s*:\s*(.*)$/i);
    if (match) {
      const key = match[1].toUpperCase();
      let value = match[2].trim();
      if (key === 'SYSTEM' || key === 'USER' || key === 'CONSTRAINTS') {
        // Gabungkan dengan baris selanjutnya jika value kosong (multiline)
        // Simple implementation: kita ambil sisa blok setelah key sampai key berikutnya
        // (to do: implement multiline properly)
      }
      config[key] = value;
    }
  }
  
  // Isi editor
  if (config.SYSTEM) document.getElementById('systemPrompt').value = config.SYSTEM;
  if (config.USER) document.getElementById('userPrompt').value = config.USER;
  if (config.TONE) document.getElementById('tone').value = config.TONE;
  if (config.FORMAT) document.getElementById('outputFormat').value = config.FORMAT;
  if (config.REASONING) document.getElementById('reasoning').value = config.REASONING;
  if (config.CONSTRAINTS) document.getElementById('constraintPrompt').value = config.CONSTRAINTS;
  
  updateCharCount();
  toast('Prompt udah diracik dan diisi ke editor! 🎉');
}

// ── Pastikan init() dan fungsi lama tetap ada ──
// (masukkan seluruh kode JavaScript v3.1 di bawah, tanpa perubahan)

</script>
</body>
</html>
